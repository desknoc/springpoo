spring.application.name=springpoo
server.error.whitelabel.enabled=false
server.error.path=/error

# =============================================
# CONFIGURACIÓN DE LOGGING - ERROR LOGGING
# =============================================

# Nivel global de log (INFO para la app general)
logging.level.root=INFO

# Capturar errores específicos de tus controladores
logging.level.com.sena.springpoo.controller=ERROR

# Capturar errores de Spring Web (DispatcherServlet, etc.)
logging.level.org.springframework.web=ERROR

# Capturar errores de JDBC / conexión a BD
logging.level.org.springframework.jdbc=ERROR

# =============================================
# CONFIGURACIÓN DEL ARCHIVO DE SALIDA
# =============================================

# Nombre y ruta del archivo de log
logging.file.name=logs/errors.log

# Tamaño máximo del archivo antes de rotar
logging.logback.rollingpolicy.max-file-size=10MB

# Cuántos archivos históricos conservar
logging.logback.rollingpolicy.max-history=30

# Patrón del mensaje en el archivo
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

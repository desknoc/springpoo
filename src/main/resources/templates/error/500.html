<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>500 - Error Interno del Servidor</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f8f9fa;
            color: #2d2d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        img {
            width: 150px;
            margin-bottom: 20px;
            filter: grayscale(1);
        }
        h1 {
            font-size: 80px;
            margin: 0;
            color: #e74c3c; /* Rojo para indicar error crítico */
        }
        h2 {
            margin-top: 0;
            color: #2d2d2d;
        }
        p {
            font-size: 18px;
            color: #7f8c8d;
        }
        .btn-home {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .btn-home:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://cdn-icons-png.flaticon.com/512/752/752755.png" alt="Server Error">
    <h1>500</h1>
    <h2>Error Interno del Servidor</h2>
    <p>Vuelbe a intentarlo más tarde.</p>
    <a href="/" class="btn-home">Volver al Inicio</a>
</div>

</body>
</html>

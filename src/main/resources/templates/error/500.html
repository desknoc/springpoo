<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" data-i18n-title="error.500.titulo">
<head>
    <meta charset="UTF-8">
    <title>500 - Error Interno del Servidor</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f8f9fa;
            color: #2d2d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        img {
            width: 150px;
            margin-bottom: 20px;
            filter: grayscale(1);
        }

        h1 {
            font-size: 80px;
            margin: 0;
            color: #e74c3c;
        }

        h2 { margin-top: 0; color: #2d2d2d; }

        p {
            font-size: 18px;
            color: #7f8c8d;
        }

        .btn-home {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .btn-home:hover { background-color: #45a049; }

        /* ── Selector de idioma ── */
        .lang-selector {
            position: fixed;
            top: 15px;
            right: 20px;
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: 2px solid #4CAF50;
            background-color: white;
            color: #4CAF50;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .lang-btn:hover,
        .lang-btn.active {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>

<!-- ✅ Selector de idioma -->
<div class="lang-selector">
    <button class="lang-btn" data-lang="es" onclick="I18n.setLang('es')">🇨🇴 ES</button>
    <button class="lang-btn" data-lang="en" onclick="I18n.setLang('en')">🇺🇸 EN</button>
</div>

<div class="container">
    <img src="https://cdn-icons-png.flaticon.com/512/752/752755.png" alt="Server Error">
    <h1>500</h1>
    <h2 data-i18n="error.500.h2">Error Interno del Servidor</h2>
    <p data-i18n="error.500.mensaje">Vuelve a intentarlo más tarde.</p>
    <a href="/" class="btn-home" data-i18n="error.500.volver">Volver al Inicio</a>
</div>

<!-- ✅ Scripts al final del body -->
<script th:src="@{/js/translations.js}"></script>
<script th:src="@{/js/i18n.js}"></script>

</body>
</html>

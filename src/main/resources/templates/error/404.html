<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Página no encontrada</title>

  <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #0d1117;
        color: #c9d1d9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        max-width: 500px;
    }

    img {
        width: 200px;
        margin-bottom: 20px;
    }

    h1 {
        font-size: 50px;
        margin: 10px 0;
    }

    p {
        font-size: 18px;
        color: #8b949e;
    }

    a {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background-color: #238636;
        color: white;
        text-decoration: none;
        border-radius: 6px;
    }

    a:hover {
        background-color: #2ea043;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Imagen estilo GitHub (puedes cambiarla si quieres) -->
  <img src="https://cdn-icons-png.flaticon.com/512/2748/2748558.png" alt="Error 404">

  <h1>404</h1>

  <p>Oops... la página que buscas no existe.</p>

  <a href="/">Volver al inicio</a>

</div>

</body>
</html>

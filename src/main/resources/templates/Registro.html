<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuarios</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff; /* Fondo blanco para el background */
            color: #333;
            text-align: center;
            padding-top: 50px;
            margin: 0;
        }

        /* Estructura del formulario en gris oscuro */
        form {
            background-color: #2d2d2d; /* Gris oscuro */
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            color: #2d2d2d;
            margin-bottom: 25px;
        }

        /* Campos de entrada en blanco */
        input, select {
            margin: 10px 0;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background-color: #ffffff; /* Blanco para los campos */
            color: #333;
            width: 100%;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #4CAF50; /* Resalte verde al escribir */
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }

        /* Botón de registro en verde */
        input[type="submit"] {
            background-color: #4CAF50; /* Verde */
            color: white;
            cursor: pointer;
            border: none;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            transition: background 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        /* Botón de navegación al CRUD en verde */
        .btn-crud {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #4CAF50; /* Verde */
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .btn-crud:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<h1>Registrarse</h1>

<form action="/guardarUsuario" method="post">
    <input type="text" name="primerNombre" placeholder="Primer Nombre" required>
    <input type="text" name="segundoNombre" placeholder="Segundo Nombre">
    <input type="text" name="primerApellido" placeholder="Primer Apellido" required>
    <input type="text" name="segundoApellido" placeholder="Segundo Apellido">

    <select name="tipoDocumento" required>
        <option value="" disabled selected>Tipo de Documento</option>
        <option value="CC">Cédula de Ciudadanía</option>
        <option value="TI">Tarjeta de Identidad</option>
        <option value="CE">Cédula de Extranjería</option>
    </select>

    <input type="number" name="documento" placeholder="Número de Documento" required>
    <input type="number" name="celular" placeholder="Teléfono Celular" required>
    <input type="email" name="correo" placeholder="Correo Electrónico" required>
    <input type="password" name="contrasena" placeholder="Contraseña" required>

    <input type="submit" value="Registrarse">
</form>

<br>
<a href="/crud" class="btn-crud">Ir a Gestión de Usuarios (CRUD)</a>

</body>
</html>

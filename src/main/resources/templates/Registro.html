<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<center><h1>Registrate</h1>
    <form action="/guardarUsuario" method="post">
        <label for="primerNombre">Primer Nombre:</label>
        <input type="text" id="primerNombre" name="primerNombre" placeholder="Ingresa tu primer nombre" required><br><br>

        <label for="segundoNombre">Segundo Nombre:</label>
        <input type="text" id="segundoNombre" name="segundoNombre" placeholder="Ingresa tu segundo nombre"><br><br>

        <label for="primerApellido">Primer Apellido:</label>
        <input type="text" id="primerApellido" name="primerApellido" placeholder="Ingresa tu primer apellido" required><br><br>

        <label for="segundoApellido">Segundo Apellido:</label>
        <input type="text" id="segundoApellido" name="segundoApellido" placeholder="Ingresa tu segundo apellido"><br><br>

        <label for="tipoDocumento">Tipo de Documento:</label>
        <select id="tipoDocumento" name="tipoDocumento" required>
            <option value="">Selecciona un tipo de documento</option>
            <option value="CC">Cédula de Ciudadanía</option>
            <option value="TI">Tarjeta de Identidad</option>
            <option value="CE">Cédula de Extranjería</option>
        </select><br><br>

        <label for="documento">Número de Documento:</label>
        <input type="number" id="documento" name="documento" placeholder="Ingresa tu número de documento" required><br><br>

        <label for="celular">Celular:</label>
        <input type="tel" id="celular" name="celular" placeholder="Ingresa tu número de celular" required><br><br>

        <label for="ficha">Ficha:</label>
        <input type="number" id="ficha" name="ficha" placeholder="Ingresa tu número de ficha"><br><br>

        <label for="correo">Email:</label>
        <input type="email" id="correo" name="correo" placeholder="Ingresa tu email" required><br><br>

        <label for="contrasena">Contraseña:</label>
        <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña" required><br><br>

        <input type="submit" value="Registrarse">
    </form>
</center>
</body>
</html>
